<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

</head>

<body>

<div class="app">

<div class="topbar">
<h1>QR Generator</h1>
<button id="themeToggle">
            <img id="themeIcon" src="SVG/sun.svg" alt="Theme icon" width="24" height="24">
        </button>
</div>

<input id="text" type="text" placeholder="Paste link or text">

<label>QR Color</label> <input type="color" id="qrColor" value="#111111">

<label>Background</label> <input type="color" id="bgColor" value="#ffffff">

<label>Style</label> <select id="qrStyle">

<option value="dots">Smooth Dots</option>
<option value="rounded">Rounded</option>
<option value="square">Square</option>
</select>

<button id="generateBtn">Generate</button>

<div id="qr-container"></div>

<button id="downloadBtn">Download PNG</button>

</div>

<script src="script.js"></script>

</body>
</html>
