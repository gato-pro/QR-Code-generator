<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

</head>

<body>

<div class="app">

<h1>QR Code Generator</h1>

<input id="text" type="text" placeholder="Enter text or URL">

<label>QR Color</label> <input type="color" id="qrColor" value="#111111">

<label>Background Color</label> <input type="color" id="bgColor" value="#ffffff">

<label>QR Style</label> <select id="qrStyle">

<option value="rounded">Modern Rounded</option>
<option value="square">Classic Square</option>
<option value="dots">Smooth Dots</option>
</select>

<button id="generateBtn">Generate QR</button>

<div id="qr-container"></div>

<button id="downloadBtn">Download PNG</button>

</div>

<script src="script.js"></script>

</body>
</html>
